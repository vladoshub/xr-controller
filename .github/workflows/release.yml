name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: xr-imu-xiao-nrf54l15-sense

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Zephyr workspace
        uses: zephyrproject-rtos/action-zephyr-setup@v1
        with:
          app-path: xr-imu-xiao-nrf54l15-sense
          toolchains: arm-zephyr-eabi
          sdk-version: 1.0.1

      - name: Test protocol codec
        run: xr-imu-xiao-nrf54l15-sense/scripts/test_host.sh

      - name: Build firmware
        run: |
          west build \
            --board xiao_nrf54l15/nrf54l15/cpuapp \
            --build-dir build/xiao_nrf54l15 \
            xr-imu-xiao-nrf54l15-sense

      - name: Package firmware
        env:
          BUILD_DIR: ${{ github.workspace }}/build/xiao_nrf54l15
          OUT_DIR: ${{ github.workspace }}/dist
        run: xr-imu-xiao-nrf54l15-sense/scripts/package_artifacts.sh

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "${GITHUB_WORKSPACE}"/dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --generate-notes
