# Binary-only UART transport. Never enable console/log output on uart20.
CONFIG_SERIAL=y
CONFIG_UART_ASYNC_API=y
CONFIG_UART_ASYNC_TX_CACHE_SIZE=64
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n
CONFIG_STDOUT_CONSOLE=n
CONFIG_PRINTK=n
CONFIG_LOG=n
CONFIG_BOOT_BANNER=n

# The Sense IMU rail is controlled by the board fixed regulator pdm_imu_pwr
# on P0.1. It must be enabled before the LSM6DSL driver initializes.
CONFIG_GPIO=y
CONFIG_REGULATOR=y
CONFIG_REGULATOR_FIXED=y
CONFIG_I2C=y
CONFIG_SENSOR=y
CONFIG_LSM6DSL=y
CONFIG_FPU=y

CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=1024
CONFIG_HEAP_MEM_POOL_SIZE=0
CONFIG_TICKLESS_KERNEL=y

# Fixed sensor configuration. Avoid runtime sensor_attr_set() during startup.
# Kconfig ODR value 5 = 208 Hz for both accelerometer and gyroscope.
CONFIG_LSM6DSL_ACCEL_FS=16
CONFIG_LSM6DSL_ACCEL_ODR=5
CONFIG_LSM6DSL_GYRO_FS=2000
CONFIG_LSM6DSL_GYRO_ODR=5

CONFIG_HWINFO=y
